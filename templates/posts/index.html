  {{define "content"}}
    <h1>Posts</h1>
    {{range .Posts}}
    <article>
        <h2><a href="/posts/{{.Slug}}">{{.Title}}</a></h2>
        <p>{{.Tagline}}</p>
    </article>
    {{else}}
    <p>No posts yet.</p>
    {{end}}

    {{with .Pagination}}
    <nav class="pagination">
      {{if .HasPrev}}
        <a href="/posts?page={{subtract .CurrentPage 1}}">&larr; Newer</a>
      {{end}}
      <span>Page {{.CurrentPage}} of {{.TotalPages}}</span>
      {{if .HasNext}}
        <a href="/posts?page={{add .CurrentPage 1}}">Older &rarr;</a>
      {{end}}
    </nav>
    {{end}}
  {{end}}
